name: Semver Benchmarks

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/semver-benchmarks.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "benches/semver.rs"
      - "benches/semver_corpus.json"
      - "benches/template/BENCHMARKS.md"
      - "scripts/benchmark-node-semver.mjs"
      - "scripts/benchmark-semver.mjs"
      - "src/core/resolver/semver/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  update-semver-benchmarks:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-latest

    steps:
      - name: Check out pull request branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Check out current ref
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4

      - name: Run semver benchmarks
        run: node scripts/benchmark-semver.mjs

      - name: Commit benchmark updates
        run: |
          if git diff --quiet -- benches/BENCHMARKS.md benches/histories; then
            echo "No benchmark updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benches/BENCHMARKS.md benches/histories
          git commit -m "Update semver benchmark results"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          else
            git push
          fi
